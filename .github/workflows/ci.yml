name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  qa:
    name: QA (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: ubuntu-24.04-gcc-14
            image: ghcr.io/altiolabs/gr4-dev/gnuradio4-sdk:ubuntu-24.04-gcc-14
            cxxflags: ""
            ldflags: ""
            enable_examples: "ON"
          - profile: ubuntu-24.04-gcc-15
            image: ghcr.io/altiolabs/gr4-dev/gnuradio4-sdk:ubuntu-24.04-gcc-15
            cxxflags: ""
            ldflags: ""
            enable_examples: "ON"
          - profile: ubuntu-24.04-clang-20
            image: ghcr.io/altiolabs/gr4-dev/gnuradio4-sdk:ubuntu-24.04-clang-20
            cxxflags: "-stdlib=libc++"
            ldflags: "-stdlib=libc++"
            enable_examples: "OFF"
    container:
      image: ${{ matrix.image }}
      options: --user root
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Boost.UT
        run: |
          git clone --depth 1 --branch v2.3.1 https://github.com/boost-ext/ut.git /tmp/ut
          install -D -m 0644 /tmp/ut/include/boost/ut.hpp /usr/local/include/boost/ut.hpp
          install -D -m 0644 /tmp/ut/include/boost/ut.cppm /usr/local/include/boost/ut.cppm

      - name: Configure and build
        env:
          CXXFLAGS: ${{ matrix.cxxflags }}
          LDFLAGS: ${{ matrix.ldflags }}
        run: |
          cmake -S . -B build -G Ninja \
            -DENABLE_TESTING=ON \
            -DENABLE_EXAMPLES=${{ matrix.enable_examples }} \
            -DENABLE_GUI_EXAMPLES=OFF
          cmake --build build -j"$(nproc)"

      - name: Run QA tests
        run: ctest --test-dir build --output-on-failure -R "^qa_"
